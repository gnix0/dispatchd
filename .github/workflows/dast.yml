name: dast

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "HTTP or HTTPS URL exposed by the deployment to scan"
        required: true
        type: string

permissions:
  contents: read

jobs:
  zap-baseline:
    runs-on: ubuntu-latest
    steps:
      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ inputs.target_url }}
          fail_action: true
          docker_name: ghcr.io/zaproxy/zaproxy:stable

apiVersion: v1
kind: ConfigMap
metadata:
  name: task-orchestrator-config
data:
  APP_ENV: kubernetes
  LOG_LEVEL: info
  SHUTDOWN_TIMEOUT_SECONDS: "10"
  REDIS_ADDRESS: redis:6379
  SCHEDULER_POLL_INTERVAL: 2s
  LEASE_DURATION: 30s
  WORKER_HEARTBEAT_TTL: 45s
  READY_QUEUE_PREFIX: task-orchestrator:ready

apiVersion: v1
kind: ConfigMap
metadata:
  name: dispatchd-config
data:
  APP_ENV: kubernetes
  LOG_LEVEL: info
  SHUTDOWN_TIMEOUT_SECONDS: "10"
  REDIS_ADDRESS: redis:6379
  SCHEDULER_POLL_INTERVAL: 2s
  LEASE_DURATION: 30s
  WORKER_HEARTBEAT_TTL: 45s
  READY_QUEUE_PREFIX: dispatchd:ready
  AUTH_ENABLED: "false"
  AUTH_JWT_ISSUER: dispatchd
  AUTH_JWT_AUDIENCE: dispatchd-clients
  AUTH_JWT_SHARED_SECRET_FILE: ""
  AUTH_JWT_PUBLIC_KEY_PEM_FILE: ""
  AUDIT_LOG_ENABLED: "true"
  TLS_ENABLED: "false"
  TLS_REQUIRE_CLIENT_CERT: "false"
  TRACING_ENABLED: "true"
  OTLP_ENDPOINT: jaeger-collector.observability.svc.cluster.local:4317
  OTLP_INSECURE: "true"
  TRACE_SAMPLE_RATE: "1.0"

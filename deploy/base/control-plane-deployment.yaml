apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: control-plane
        app.kubernetes.io/component: control-plane
    spec:
      serviceAccountName: task-orchestrator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control-plane
          image: ghcr.io/gnix0/task-orchestrator-control-plane:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          envFrom:
            - configMapRef:
                name: task-orchestrator-config
          env:
            - name: GRPC_PORT
              value: "8080"
          ports:
            - name: grpc
              containerPort: 8080
          readinessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 3
          livenessProbe:
            grpc:
              port: 8080
            initialDelaySeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi

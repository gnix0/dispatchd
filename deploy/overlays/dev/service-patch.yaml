apiVersion: v1
kind: Service
metadata:
  name: control-plane
spec:
  type: NodePort
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
      nodePort: 31080
---
apiVersion: v1
kind: Service
metadata:
  name: worker-gateway
spec:
  type: NodePort
  ports:
    - name: grpc
      port: 8080
      targetPort: grpc
      nodePort: 31081

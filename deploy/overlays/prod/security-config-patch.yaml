apiVersion: v1
kind: ConfigMap
metadata:
  name: dispatchd-config
data:
  APP_ENV: production
  AUTH_ENABLED: "true"
  AUTH_JWT_ISSUER: dispatchd
  AUTH_JWT_AUDIENCE: dispatchd-clients
  AUTH_JWT_PUBLIC_KEY_PEM_FILE: /vault/secrets/jwt-public-key.pem
  AUTH_JWT_SHARED_SECRET_FILE: ""
  AUDIT_LOG_ENABLED: "true"
  TLS_ENABLED: "true"
  TLS_REQUIRE_CLIENT_CERT: "true"

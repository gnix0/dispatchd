apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: control-plane
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: control-plane
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: scheduler
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scheduler
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: worker-gateway
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker-gateway

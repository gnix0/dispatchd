apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-orchestrator-dev
  namespace: argocd
spec:
  project: task-orchestrator
  source:
    repoURL: https://github.com/gnix0/task-orchestrator.git
    targetRevision: main
    path: deploy/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: task-orchestrator-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

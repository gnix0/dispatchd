services:
  postgres:
    image: postgres:17-bookworm
    environment:
      POSTGRES_DB: task_orchestrator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-bookworm
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:1.63.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - control-plane
      - scheduler
      - worker-gateway

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  control-plane:
    image: ghcr.io/gnix0/task-orchestrator-control-plane:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: control-plane
    environment:
      APP_ENV: compose
      LOG_LEVEL: debug
      GRPC_PORT: "8080"
      METRICS_PORT: "9100"
      SHUTDOWN_TIMEOUT_SECONDS: "10"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/task_orchestrator?sslmode=disable
      REDIS_ADDRESS: redis:6379
      SCHEDULER_POLL_INTERVAL: 2s
      LEASE_DURATION: 30s
      WORKER_HEARTBEAT_TTL: 45s
      INSTANCE_ID: control-plane-compose
      AUTH_ENABLED: "false"
      AUTH_JWT_ISSUER: task-orchestrator
      AUTH_JWT_AUDIENCE: task-orchestrator-clients
      AUTH_JWT_SHARED_SECRET: change-me-dev
      AUDIT_LOG_ENABLED: "true"
      TLS_ENABLED: "false"
      TLS_REQUIRE_CLIENT_CERT: "false"
      TRACING_ENABLED: "true"
      OTLP_ENDPOINT: jaeger:4317
      OTLP_INSECURE: "true"
      TRACE_SAMPLE_RATE: "1.0"
    ports:
      - "8080:8080"
      - "9100:9100"
    depends_on:
      - postgres
      - redis
      - jaeger

  scheduler:
    image: ghcr.io/gnix0/task-orchestrator-scheduler:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: scheduler
    environment:
      APP_ENV: compose
      LOG_LEVEL: debug
      METRICS_PORT: "9101"
      SHUTDOWN_TIMEOUT_SECONDS: "10"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/task_orchestrator?sslmode=disable
      REDIS_ADDRESS: redis:6379
      SCHEDULER_POLL_INTERVAL: 2s
      LEASE_DURATION: 30s
      WORKER_HEARTBEAT_TTL: 45s
      INSTANCE_ID: scheduler-compose
      AUTH_ENABLED: "false"
      AUTH_JWT_ISSUER: task-orchestrator
      AUTH_JWT_AUDIENCE: task-orchestrator-clients
      AUTH_JWT_SHARED_SECRET: change-me-dev
      AUDIT_LOG_ENABLED: "true"
      TLS_ENABLED: "false"
      TLS_REQUIRE_CLIENT_CERT: "false"
      TRACING_ENABLED: "true"
      OTLP_ENDPOINT: jaeger:4317
      OTLP_INSECURE: "true"
      TRACE_SAMPLE_RATE: "1.0"
    ports:
      - "9101:9101"
    depends_on:
      - postgres
      - redis
      - jaeger

  worker-gateway:
    image: ghcr.io/gnix0/task-orchestrator-worker-gateway:dev
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: worker-gateway
    environment:
      APP_ENV: compose
      LOG_LEVEL: debug
      GRPC_PORT: "8080"
      METRICS_PORT: "9102"
      SHUTDOWN_TIMEOUT_SECONDS: "10"
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/task_orchestrator?sslmode=disable
      REDIS_ADDRESS: redis:6379
      SCHEDULER_POLL_INTERVAL: 2s
      LEASE_DURATION: 30s
      WORKER_HEARTBEAT_TTL: 45s
      INSTANCE_ID: worker-gateway-compose
      AUTH_ENABLED: "false"
      AUTH_JWT_ISSUER: task-orchestrator
      AUTH_JWT_AUDIENCE: task-orchestrator-clients
      AUTH_JWT_SHARED_SECRET: change-me-dev
      AUDIT_LOG_ENABLED: "true"
      TLS_ENABLED: "false"
      TLS_REQUIRE_CLIENT_CERT: "false"
      TRACING_ENABLED: "true"
      OTLP_ENDPOINT: jaeger:4317
      OTLP_INSECURE: "true"
      TRACE_SAMPLE_RATE: "1.0"
    ports:
      - "8081:8080"
      - "9102:9102"
    depends_on:
      - postgres
      - redis
      - jaeger

volumes:
  postgres-data:
